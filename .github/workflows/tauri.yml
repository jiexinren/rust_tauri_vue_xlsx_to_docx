name: 'publish'

on:
  push:
    branches:
      - main
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-binaries:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v2

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf javascriptcoregtk-4.1

      - name: install frontend dependencies
        run: pnpm install

      - name: build app
        run: pnpm tauri build

      # Upload build artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/
            src-tauri/target/release/*.exe
            src-tauri/target/release/*.app
            src-tauri/target/release/*.deb

  publish:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
      
      # Download all platform artifacts
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      # 创建release分支并提交编译产物
      - name: 创建release分支并提交编译产物
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 检查release分支是否存在，如果存在则删除
          if git show-ref --verify --quiet refs/heads/release; then
            git branch -D release
          fi
          
          # 创建并切换到release分支
          git checkout -b release
          
          # 创建releases目录并复制构建产物
          mkdir -p releases
          cp -r artifacts/* releases/
          
          # 提交到release分支
          git add releases/
          git commit -m "发布编译产物 $(date +'%Y-%m-%d %H:%M:%S')"
          
          # 推送release分支
          git push origin release --force